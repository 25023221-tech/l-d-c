];
let currentQuestion = 0;
let score = 0;
let answered = false;

let wrongTopics = [];

const progress = document.getElementById("progress");
const questionNumber = document.getElementById("questionNumber");
const questionBox = document.getElementById("question");
const optionsBox = document.getElementById("options");
const explanationBox = document.getElementById("explanation");

const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");

shuffleQuestions();

loadQuestion();

function shuffleQuestions(){

for(let i = questions.length - 1; i > 0; i--){

    let j = Math.floor(Math.random() * (i + 1));

    [questions[i], questions[j]] =
    [questions[j], questions[i]];
}

}

function loadQuestion(){

answered = false;

const q = questions[currentQuestion];

questionNumber.innerHTML =
`Câu ${currentQuestion + 1} / ${questions.length}`;

questionBox.innerHTML = q.question;

optionsBox.innerHTML = "";

explanationBox.style.display = "none";

q.options.forEach((option,index)=>{

    const btn = document.createElement("button");

    btn.className = "option";

    btn.innerHTML =
    String.fromCharCode(65 + index) + ". " + option;

    btn.onclick = () => selectAnswer(index);

    optionsBox.appendChild(btn);

});

progress.style.width =
((currentQuestion)/questions.length)*100 + "%";

saveProgress();

}

function selectAnswer(selected){

if(answered) return;

answered = true;

const q = questions[currentQuestion];

const buttons =
document.querySelectorAll(".option");

buttons.forEach(btn=>btn.disabled=true);

buttons[q.answer].classList.add("correct");

if(selected === q.answer){

    score++;

}else{

    buttons[selected].classList.add("wrong");

    wrongTopics.push(q.category);

}

explanationBox.style.display = "block";

explanationBox.innerHTML =
"<strong>Giải thích:</strong><br><br>" +
q.explanation;

saveProgress();

}

nextBtn.addEventListener("click",()=>{

if(!answered) return;

currentQuestion++;

if(currentQuestion >= questions.length){

    showResult();
    return;

}

loadQuestion();

});

prevBtn.addEventListener("click",()=>{

if(currentQuestion === 0) return;

currentQuestion--;

loadQuestion();

});

function saveProgress(){

const data = {

    currentQuestion,
    score,
    wrongTopics

};

localStorage.setItem(
    "philosophyQuiz75",
    JSON.stringify(data)
);

}

function restoreProgress(){

const raw =
localStorage.getItem(
    "philosophyQuiz75"
);

if(!raw) return;

const data =
JSON.parse(raw);

currentQuestion =
data.currentQuestion || 0;

score =
data.score || 0;

wrongTopics =
data.wrongTopics || [];

}

restoreProgress();

function resetQuiz(){

localStorage.removeItem(
    "philosophyQuiz75"
);

location.reload();

}

function showResult(){

document.getElementById("quiz")
.style.display = "none";

document.getElementById("result")
.style.display = "block";

progress.style.width = "100%";

const percent =
Math.round(
    score/questions.length*100
);

document.getElementById("score")
.innerHTML =
`
<h2>
${score}/${questions.length}
</h2>

<h3>
${percent}%
</h3>
`;

buildStatistics();

}
function buildStatistics(){

const topicStatsDiv =
document.getElementById("topicStats");

const reviewDiv =
document.getElementById("review");

const topics = {};

questions.forEach(q=>{

    if(!topics[q.category]){

        topics[q.category] = 0;

    }

});

wrongTopics.forEach(topic=>{

    if(topics[topic] !== undefined){

        topics[topic]++;

    }

});

let statsHTML = "";

Object.keys(topics).forEach(topic=>{

    const wrong = topics[topic];

    const total =
    questions.filter(
        q=>q.category===topic
    ).length;

    const correct =
    total - wrong;

    const percentage =
    Math.round(
        correct/total*100
    );

    let level = "";

    if(percentage >= 85){

        level =
        "🟢 Rất tốt";

    }else if(
        percentage >= 70
    ){

        level =
        "🟡 Khá";

    }else if(
        percentage >= 50
    ){

        level =
        "🟠 Trung bình";

    }else{

        level =
        "🔴 Cần ôn tập";

    }

    statsHTML +=
    `
    <div style="
    margin-bottom:12px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    ">
    <strong>${topic}</strong><br>
    Đúng:
    ${correct}/${total}
    (${percentage}%)
    <br>
    Đánh giá:
    ${level}
    </div>
    `;

});

topicStatsDiv.innerHTML =
statsHTML;

buildReview();

}

function buildReview(){

const reviewDiv =
document.getElementById("review");

const weakTopics =
[...new Set(wrongTopics)];

if(
    weakTopics.length === 0
){

    reviewDiv.innerHTML =
    `
    <p>
    🎉 Bạn không có chủ đề yếu nổi bật.
    </p>

    <p>
    Hãy thử đọc sâu hơn:
    Plato,
    Aristotle,
    Kant,
    Hegel,
    Marx,
    Nietzsche.
    </p>
    `;

    return;

}

let reviewHTML =
"<ul>";

weakTopics.forEach(topic=>{

    let suggestion = "";

    switch(topic){

        case "Ontology":

            suggestion =
            "Ôn bản thể luận, duy vật, duy tâm, Plato và Aristotle.";
            break;

        case "Epistemology":

            suggestion =
            "Ôn nhận thức luận, Descartes, Hume, Kant, chân lý và thực tiễn.";
            break;

        case "Logic":

            suggestion =
            "Ôn tam đoạn luận, Modus Ponens, lượng từ và ngụy biện.";
            break;

        case "Dialectics":

            suggestion =
            "Ôn mâu thuẫn biện chứng, lượng-chất, phủ định của phủ định.";
            break;

        case "Hegel":

            suggestion =
            "Ôn phép biện chứng duy tâm, Aufhebung, Tinh thần tuyệt đối.";
            break;

        case "Marx":

            suggestion =
            "Ôn duy vật lịch sử, lực lượng sản xuất, quan hệ sản xuất, đấu tranh giai cấp.";
            break;

        case "Ethics":

            suggestion =
            "Ôn Kant, Aristotle, hệ quả luận và các học thuyết đạo đức.";
            break;

        case "Nietzsche":

            suggestion =
            "Ôn ý chí sức mạnh, siêu nhân và phê phán đạo đức truyền thống.";
            break;

        case "Political Philosophy":

            suggestion =
            "Ôn Plato, Marx và các lý thuyết nhà nước.";
            break;

        case "Synthesis":

            suggestion =
            "Luyện so sánh các hệ thống triết học và câu hỏi liên ngành.";
            break;

        default:

            suggestion =
            "Ôn tập lại chuyên đề này.";
    }

    reviewHTML +=
    `
    <li>
    <strong>${topic}</strong>:
    ${suggestion}
    </li>
    `;

});

reviewHTML +=
"</ul>";

reviewHTML +=
`
<button
    onclick="resetQuiz()"
    style="
    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    "
>
    Làm lại bài kiểm tra
</button>
`;

reviewDiv.innerHTML =
reviewHTML;

}

</script>
