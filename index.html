<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đề Thi Thực Vật Dược – HK2 2025-2026 – K80</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark: #1b4332; --green-mid: #2d6a4f; --green-light: #40916c;
  --green-pale: #d8f3dc; --accent: #b7e4c7; --gold: #e9c46a;
  --gold-dark: #c9a227; --red: #e63946; --blue: #1d6fa4;
  --bg: #f0f7f2; --card: #ffffff; --text: #1a2e1a;
  --muted: #5a7a5a; --border: #c8dfc8;
  --shadow: 0 2px 12px rgba(27,67,50,0.10); --radius: 12px;
}
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }

/* HEADER */
.header { background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 55%, #52b788 100%); color: #fff; padding: 20px 16px 16px; text-align: center; }
.header-badge { display: inline-block; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); border-radius: 20px; font-size: 11px; padding: 3px 14px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.header h1 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.header-meta { font-size: 12px; opacity: 0.8; }

/* TIMER + STATS BAR */
.topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; position: sticky; top: 0; z-index: 200; box-shadow: var(--shadow); }
.topbar-inner { max-width: 800px; margin: 0 auto; }
.timer-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.timer-block { display: flex; align-items: center; gap: 8px; }
.timer-display { font-size: 24px; font-weight: 900; color: var(--green-dark); font-family: 'Courier New', monospace; background: var(--green-pale); padding: 4px 14px; border-radius: 8px; border: 2px solid var(--border); }
.timer-display.warning { color: #c9a227; background: #fff8e1; border-color: #e9c46a; }
.timer-display.danger { color: var(--red); background: #fdecea; border-color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.timer-label { font-size: 11px; color: var(--muted); font-weight: 600; }
.stat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { font-size: 12px; font-weight: 700; color: var(--green-dark); background: var(--bg); border: 1.5px solid var(--border); border-radius: 16px; padding: 4px 11px; }
.chip.done { color: var(--blue); border-color: var(--blue); background: #e8f4fd; }
.chip.correct { color: #2dc653; border-color: #2dc653; background: #d4edda; }
.chip.wrong { color: var(--red); border-color: var(--red); background: #f8d7da; }

.progress-bar-outer { background: var(--green-pale); border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 8px; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--green-mid), var(--green-light)); border-radius: 6px; transition: width 0.4s; }

.ctrl-row { display: flex; gap: 6px; flex-wrap: wrap; }
.ctrl-btn { padding: 6px 13px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 600; color: var(--green-dark); cursor: pointer; transition: all 0.15s; }
.ctrl-btn:hover { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
.ctrl-btn.primary { background: var(--green-mid); color: #fff; border-color: var(--green-mid); }
.ctrl-btn.danger-btn { border-color: var(--red); color: var(--red); }
.ctrl-btn.danger-btn:hover { background: var(--red); color: #fff; }
.ctrl-btn.gold { background: var(--gold-dark); color: #fff; border-color: var(--gold-dark); }

/* SECTION FILTER */
.section-filter { display: flex; gap: 5px; overflow-x: auto; padding: 8px 16px; scrollbar-width: none; background: var(--card); border-bottom: 1px solid var(--border); }
.section-filter::-webkit-scrollbar { display: none; }
.sflt { flex-shrink: 0; padding: 4px 12px; border-radius: 12px; border: 1.5px solid var(--border); background: #fff; font-size: 11px; color: var(--green-mid); cursor: pointer; font-weight: 700; transition: all 0.15s; white-space: nowrap; }
.sflt.active { background: var(--green-mid); color: #fff; border-color: var(--green-mid); }

/* MAIN */
.main { padding: 14px 16px; max-width: 800px; margin: 0 auto; }

/* SECTION HEADING */
.sec-heading { display: flex; align-items: center; gap: 10px; padding: 14px 0 8px; border-top: 2px solid var(--border); margin-top: 6px; }
.sec-heading:first-child { border-top: none; margin-top: 0; }
.sec-icon { font-size: 20px; }
.sec-title { font-size: 13px; font-weight: 800; color: var(--green-dark); text-transform: uppercase; letter-spacing: 0.8px; }
.sec-badge { margin-left: auto; background: var(--green-pale); color: var(--green-dark); border-radius: 10px; padding: 2px 9px; font-size: 11px; font-weight: 700; }

/* QUESTION CARD */
.q-card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; transition: box-shadow 0.2s; }
.q-card:hover { box-shadow: 0 4px 18px rgba(27,67,50,0.13); }
.q-card.answered-correct { border-color: #2dc653; }
.q-card.answered-wrong { border-color: var(--red); }
.q-card.hidden { display: none; }
.q-card.flagged { border-color: var(--gold-dark); }

.q-header { display: flex; align-items: center; gap: 8px; padding: 9px 13px 7px; border-bottom: 1px solid var(--border); background: var(--bg); }
.q-num { width: 26px; height: 26px; border-radius: 50%; background: var(--green-mid); color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.q-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
.tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; text-transform: uppercase; }
.tag.easy { background: #d4edda; color: #155724; }
.tag.medium { background: #fff3cd; color: #856404; }
.tag.hard { background: #f8d7da; color: #721c24; }
.tag.topic { background: var(--green-pale); color: var(--green-dark); }
.flag-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 4px; opacity: 0.4; transition: opacity 0.2s; }
.flag-btn.flagged { opacity: 1; }

.q-body { padding: 13px 15px; }
.q-text { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 11px; line-height: 1.65; }
.q-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }

.opts { display: flex; flex-direction: column; gap: 6px; }
.opt { display: flex; align-items: flex-start; gap: 9px; padding: 8px 11px; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; background: #fff; transition: all 0.15s; font-size: 13.5px; }
.opt:hover { border-color: var(--green-light); background: var(--green-pale); }
.opt.selected { border-color: var(--blue); background: #e8f4fd; }
.opt.correct-ans { border-color: #2dc653 !important; background: #d4edda !important; font-weight: 600; }
.opt.wrong-ans { border-color: var(--red) !important; background: #f8d7da !important; }
.opt-label { width: 22px; height: 22px; border-radius: 50%; background: var(--border); color: var(--muted); font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.opt.selected .opt-label { background: var(--blue); color: #fff; }
.opt.correct-ans .opt-label { background: #2dc653; color: #fff; }
.opt.wrong-ans .opt-label { background: var(--red); color: #fff; }

.explanation { margin-top: 9px; padding: 9px 12px; background: #e8f5e9; border-radius: 8px; border-left: 3px solid var(--green-mid); font-size: 12.5px; color: #1b4332; display: none; }
.explanation.shown { display: block; }

.q-footer { padding: 9px 15px 12px; display: flex; gap: 8px; align-items: center; }
.check-btn { padding: 7px 18px; border-radius: 16px; border: none; background: var(--green-mid); color: #fff; font-size: 12.5px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.check-btn:hover { background: var(--green-dark); }
.check-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
.result-icon { font-size: 18px; }

/* MODAL */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.55); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.shown { opacity: 1; pointer-events: all; }
.modal { background: #fff; border-radius: 18px; padding: 28px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.25); max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; }
.modal-overlay.shown .modal { transform: translateY(0); }
.modal-btn { display: block; width: 100%; padding: 11px; background: var(--green-mid); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.18s; }
.modal-btn:hover { background: var(--green-dark); }

/* REVIEW GRID */
.review-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin: 10px 0; }
.review-cell { width: 100%; aspect-ratio: 1; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg); color: var(--muted); transition: all 0.15s; }
.review-cell:hover { border-color: var(--green-light); }
.review-cell.done-correct { background: #d4edda; border-color: #2dc653; color: #155724; }
.review-cell.done-wrong { background: #f8d7da; border-color: var(--red); color: #721c24; }
.review-cell.flagged-cell { background: #fff8e1; border-color: var(--gold-dark); color: var(--gold-dark); }

@media (max-width: 480px) {
  .header h1 { font-size: 15px; }
  .timer-display { font-size: 20px; }
  .q-text { font-size: 13px; }
  .review-grid { grid-template-columns: repeat(8, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Khoa Dược liệu – Bộ môn Thực vật · HK2 · 2025-2026</div>
  <h1>🌿 ĐỀ THI TRẮC NGHIỆM THỰC VẬT DƯỢC – K80</h1>
  <div class="header-meta">75 câu hỏi · 60 phút · Chỉ 1 đáp án đúng</div>
</div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="timer-row">
      <div class="timer-block">
        <div>
          <div class="timer-label">⏱ Thời gian còn lại</div>
          <div class="timer-display" id="timer-display">60:00</div>
        </div>
      </div>
      <div class="stat-chips">
        <div class="chip">Tổng: <strong>75</strong></div>
        <div class="chip done">Đã làm: <strong id="done-count">0</strong></div>
        <div class="chip correct">Đúng: <strong id="correct-count">0</strong></div>
        <div class="chip wrong">Sai: <strong id="wrong-count">0</strong></div>
        <div class="chip" style="color:var(--gold-dark);border-color:var(--gold-dark);background:#fff8e1">Điểm: <strong id="score-pct">—</strong></div>
      </div>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn primary" onclick="showReview()">📋 Bảng câu hỏi</button>
      <button class="ctrl-btn" onclick="jumpToNext()">⏭ Câu chưa làm</button>
      <button class="ctrl-btn" onclick="showFlagged()">🚩 Câu đã đánh dấu</button>
      <button class="ctrl-btn gold" onclick="showSummary()">📊 Kết quả</button>
      <button class="ctrl-btn danger-btn" onclick="resetExam()">🔄 Làm lại</button>
    </div>
  </div>
</div>

<div class="section-filter" id="section-filter">
  <button class="sflt active" onclick="filterSection('all')">Tất cả (75)</button>
  <button class="sflt" onclick="filterSection('TV1')">TV1 · Tế bào & Mô (8)</button>
  <button class="sflt" onclick="filterSection('TV2')">TV2 · Rễ Thân Lá (10)</button>
  <button class="sflt" onclick="filterSection('TV3')">TV3 · Hoa Quả Hạt (10)</button>
  <button class="sflt" onclick="filterSection('TV4')">TV4 · Nấm (5)</button>
  <button class="sflt" onclick="filterSection('TV5')">TV5 · Rêu Quyết Thông (4)</button>
  <button class="sflt" onclick="filterSection('TV6')">TV6 · Phân loại Ngọc lan (28)</button>
  <button class="sflt" onclick="filterSection('TV7')">TV7 · Tổng hợp cây (10)</button>
</div>

<div class="main" id="quiz-container"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ======================== DỮ LIỆU CÂU HỎI ========================
const questions = [

// ===== TV1: TẾ BÀO & MÔ (8 câu) =====
{id:1,sec:'TV1',level:'easy',topic:'Tế bào',
 text:'Thể vùi (ergastic substance) trong tế bào thực vật là:',
 opts:['A. Các cơ quan tử sống có màng bao ngoài','B. Các sản phẩm trao đổi chất không hoạt động, không có màng bao','C. Lục lạp và các dạng lạp thể','D. Nhân tế bào và ribosom'],
 ans:1,
 explain:'Thể vùi (ergastic substance) là các sản phẩm trao đổi chất không có hoạt tính, không có màng bao, ví dụ: tinh bột, tannin, calci oxalat, tinh dầu, nhựa.'},

{id:2,sec:'TV1',level:'easy',topic:'Tế bào',
 text:'Cấu trúc nào đặc trưng cho tế bào thực vật mà không có ở tế bào động vật?',
 opts:['A. Nhân tế bào','B. Ty thể','C. Vách tế bào bằng cellulose','D. Màng sinh chất'],
 ans:2,
 explain:'Vách tế bào bằng cellulose là cấu trúc đặc trưng của tế bào thực vật. Tế bào động vật không có vách tế bào, chỉ có màng sinh chất.'},

{id:3,sec:'TV1',level:'medium',topic:'Tế bào',
 text:'Calci oxalat trong tế bào thực vật tồn tại ở dạng tinh thể nào là đặc trưng nhất cho họ Araceae (họ Ráy)?',
 opts:['A. Tinh thể hình kim (raphides)','B. Tinh thể hình cầu (druse/styloid)','C. Tinh thể hình lăng trụ','D. Tinh thể hình cát (microspherite)'],
 ans:0,
 explain:'Tinh thể hình kim (raphides) là dạng tinh thể calci oxalat đặc trưng của họ Araceae (Ráy). Khi kích thích sẽ gây ngứa và bỏng rát. Druse gặp ở họ Hoa hồng, Cẩm chướng.'},

{id:4,sec:'TV1',level:'medium',topic:'Mô',
 text:'Mô nào sau đây CÓ tế bào còn sống khi trưởng thành và thực hiện chức năng nâng đỡ?',
 opts:['A. Mô cứng (sclerenchyma)','B. Mô dày (collenchyma)','C. Mô gỗ (xylem)','D. Mô bần (phellem)'],
 ans:1,
 explain:'Mô dày (collenchyma) gồm các tế bào SỐNG khi trưởng thành, vách dày bằng cellulose và pectin, làm nhiệm vụ nâng đỡ bộ phận còn non. Mô cứng và gỗ có tế bào chết.'},

{id:5,sec:'TV1',level:'medium',topic:'Mô',
 text:'Tiết diện thân vuông đặc trưng cho họ thực vật nào?',
 opts:['A. Họ Bầu bí (Cucurbitaceae)','B. Họ Cói (Cyperaceae)','C. Họ Hoa môi (Lamiaceae)','D. Họ Lúa (Poaceae)'],
 ans:2,
 explain:'Họ Hoa môi (Lamiaceae) có thân vuông – đây là đặc điểm nhận dạng quan trọng. Mnemonic: "Vuông – Đối – Môi – Thơm". Họ Cói có thân tam giác.'},

{id:6,sec:'TV1',level:'medium',topic:'Mô',
 text:'Lỗ khí (stomata) thường phân bố ở mặt nào của lá cây ưa bóng sống trên cạn?',
 opts:['A. Chỉ ở mặt trên','B. Chỉ ở mặt dưới','C. Cả hai mặt','D. Không có lỗ khí'],
 ans:1,
 explain:'Lá cây trên cạn thường có lỗ khí ở mặt dưới (lá lưỡng diện). Cây thủy sinh nổi có lỗ khí ở mặt trên. Cỏ/lúa có lỗ khí cả hai mặt.'},

{id:7,sec:'TV1',level:'hard',topic:'Mô',
 text:'Ống tiết (secretory canal) khác với túi tiết (secretory cavity) ở điểm nào?',
 opts:['A. Ống tiết dài, có nhiều tế bào tiết xếp dọc; túi tiết là khoang cầu tròn','B. Ống tiết chứa nhựa dầu; túi tiết chứa tinh dầu','C. Ống tiết ở rễ; túi tiết ở thân và lá','D. Ống tiết do tế bào chết tạo ra; túi tiết do tế bào sống'],
 ans:0,
 explain:'Ống tiết (vitreous canal) là cấu trúc dài hình ống gồm nhiều tế bào tiết xếp dọc (ví dụ: ống nhựa dầu họ Cà rốt). Túi tiết là khoang cầu hay bầu dục (ví dụ: túi tinh dầu họ Cam).'},

{id:8,sec:'TV1',level:'hard',topic:'Mô',
 text:'Tầng hóa bần – lục bì (phellogen) sinh ra những thành phần nào?',
 opts:['A. Bần (phellem) ở ngoài và lục bì (phelloderm) ở trong','B. Gỗ 2 ở trong và libe 2 ở ngoài','C. Bần ở trong và lục bì ở ngoài','D. Chỉ sinh ra tế bào bần'],
 ans:0,
 explain:'Tầng sinh bần – lục bì (phellogen): hướng ngoài → Bần (phellem, tế bào chết không thấm nước); hướng trong → Lục bì (phelloderm, tế bào sống có lục lạp). Bần + Phellogen + Lục bì = Chu bì.'},

// ===== TV2: RỄ THÂN LÁ (10 câu) =====
{id:9,sec:'TV2',level:'easy',topic:'Rễ',
 text:'Cấu tạo cấp 1 của rễ cây lớp Ngọc Lan từ ngoài vào trong gồm:',
 opts:['A. Biểu bì – Vỏ – Nội bì – Trung trụ','B. Biểu bì – Nội bì – Vỏ – Trung trụ','C. Vỏ – Biểu bì – Trung trụ – Nội bì','D. Biểu bì – Vỏ – Trung trụ – Nội bì'],
 ans:0,
 explain:'Cấu tạo sơ cấp rễ (ngoài → trong): Biểu bì (có lông hút) → Vỏ (ngoại bì + mô mềm vỏ) → Nội bì (có đai caspary) → Trung trụ (trụ bì + bó dẫn + tủy).'},

{id:10,sec:'TV2',level:'easy',topic:'Rễ',
 text:'Đặc điểm phân biệt cấu tạo giải phẫu rễ sơ cấp lớp Ngọc Lan và lớp Hành là:',
 opts:['A. Lớp Ngọc Lan không có nội bì; lớp Hành có nội bì','B. Lớp Ngọc Lan có tủy nhỏ hoặc không có; lớp Hành có tủy lớn','C. Lớp Ngọc Lan và Hành giống nhau hoàn toàn','D. Lớp Hành không có trụ bì'],
 ans:1,
 explain:'Rễ lớp Ngọc Lan: tủy nhỏ hoặc không có (số bó mạch ≤6, xếp đối nhau). Rễ lớp Hành: tủy lớn, nhiều bó mạch (>6 bó), xếp xen kẽ libe-gỗ xung quanh tủy.'},

{id:11,sec:'TV2',level:'medium',topic:'Thân',
 text:'Thân củ khác thân rễ ở điểm nào?',
 opts:['A. Thân củ mọc thẳng đứng dưới đất, thân rễ mọc nằm ngang','B. Thân củ không có vảy lá, thân rễ có vảy lá','C. Thân củ là rễ biến dạng, thân rễ là thân biến dạng','D. Không có sự khác biệt'],
 ans:0,
 explain:'Thân củ (tuber): mọc thẳng đứng dưới đất, mập, tích lũy chất dự trữ (khoai tây). Thân rễ (rhizome): mọc nằm ngang dưới đất, có đốt, mắt, vảy lá (gừng, nghệ).'},

{id:12,sec:'TV2',level:'medium',topic:'Thân',
 text:'Trong cấu tạo giải phẫu thân cây hai lá mầm (lớp Ngọc Lan) cấp 1, bó mạch xếp theo kiểu nào?',
 opts:['A. Bó mạch rải rác','B. Bó mạch xếp thành vòng','C. Một bó mạch trung tâm','D. Nhiều vòng bó mạch'],
 ans:1,
 explain:'Thân cây hai lá mầm (Ngọc Lan): bó mạch xếp thành VÒNG. Thân cây một lá mầm (Hành): bó mạch rải rác. Đây là đặc điểm phân biệt cơ bản.'},

{id:13,sec:'TV2',level:'medium',topic:'Lá',
 text:'Lá kép lông chim khác lá đơn xẻ thùy lông chim ở điểm:',
 opts:['A. Lá kép có nhiều lá chét riêng biệt, không có chồi nách; lá đơn có phiến liên tục và có chồi nách','B. Lá kép có chồi nách tại mỗi lá chét; lá đơn không có chồi nách','C. Lá kép và lá đơn xẻ thùy hoàn toàn giống nhau về hình thái ngoài','D. Lá kép mọc đối; lá đơn mọc cách'],
 ans:0,
 explain:'Phân biệt lá kép – lá đơn xẻ: Lá kép → lá chét không có chồi nách, cuống lá chét không có lá kèm. Lá đơn → có chồi nách ở nách lá, phiến lá liên tục.'},

{id:14,sec:'TV2',level:'medium',topic:'Lá',
 text:'Đặc điểm "gân lá song song" đặc trưng cho:',
 opts:['A. Cây hai lá mầm (lớp Ngọc Lan)','B. Cây một lá mầm (lớp Hành)','C. Cây Dương xỉ','D. Cây Hạt trần'],
 ans:1,
 explain:'Gân lá song song (parallel venation) đặc trưng cho lớp Hành (một lá mầm). Lớp Ngọc Lan (hai lá mầm) có gân lá mạng lưới (netted venation).'},

{id:15,sec:'TV2',level:'hard',topic:'Rễ',
 text:'Rễ thở (pneumatophore) của cây Mắm, Bần ở rừng ngập mặn có chức năng chính là:',
 opts:['A. Hấp thu nước từ đất bùn','B. Trao đổi khí với không khí khi ngập triều','C. Dự trữ chất dinh dưỡng','D. Bám vào giá thể'],
 ans:1,
 explain:'Rễ thở (pneumatophore) mọc thẳng đứng lên khỏi mặt bùn, có nhiều lỗ thở (lenticel). Khi thủy triều rút, không khí vào qua lỗ thở giúp rễ hô hấp trong môi trường thiếu oxy.'},

{id:16,sec:'TV2',level:'hard',topic:'Lá',
 text:'Tuyến mật hoa (nectary) của lá biến đổi thành gì ở cây Bắt ruồi (Dionaea muscipula)?',
 opts:['A. Gai lá để bảo vệ','B. Tua cuốn leo','C. Bẫy có lông nhạy cảm kích thích','D. Vảy bảo vệ chồi'],
 ans:2,
 explain:'Cây bắt mồi (carnivorous plants) như Bắt ruồi có lá biến thành bẫy với lông nhạy cảm. Khi con mồi chạm vào lông, bẫy đóng lại. Đây là ví dụ điển hình về lá biến dạng thực hiện chức năng đặc biệt.'},

{id:17,sec:'TV2',level:'hard',topic:'Thân',
 text:'Gỗ (xylem) cấp 2 của cây thân gỗ hai lá mầm được sinh ra bởi:',
 opts:['A. Tầng sinh bần – lục bì (phellogen)','B. Tượng tầng bó libe-gỗ (vascular cambium)','C. Mô phân sinh ngọn','D. Ngoại bì'],
 ans:1,
 explain:'Tượng tầng bó mạch (vascular cambium) hoạt động sinh ra: Gỗ 2 (xylem 2) về phía trong và Libe 2 (phloem 2) về phía ngoài. Tầng phellogen chỉ sinh ra bần và lục bì.'},

{id:18,sec:'TV2',level:'medium',topic:'Lá',
 text:'Biểu bì lá (epidermis) có đặc điểm nào sau đây?',
 opts:['A. Gồm nhiều lớp tế bào, có lục lạp, không có lỗ khí','B. Một lớp tế bào không có lục lạp (trừ tế bào bảo vệ), có lỗ khí và lông biểu bì','C. Một lớp tế bào có nhiều lục lạp, thực hiện quang hợp','D. Gồm tế bào chết, không thấm nước'],
 ans:1,
 explain:'Biểu bì lá: một lớp tế bào sống, vách ngoài phủ cutin, KHÔNG có lục lạp (trừ tế bào bảo vệ). Có lỗ khí và lông biểu bì (lông che chở, lông tiết).'},

// ===== TV3: HOA QUẢ HẠT (10 câu) =====
{id:19,sec:'TV3',level:'easy',topic:'Hoa',
 text:'Hoa thức K5 C5 A∞ G(5) biểu diễn:',
 opts:['A. Đài 5, tràng 5, nhị vô số, nhụy 5 lá noãn rời','B. Đài 5, tràng 5, nhị vô số, nhụy 5 lá noãn hợp, bầu trên','C. Đài 5, tràng 5, nhị 5, nhụy bầu dưới','D. Đài và tràng 5, nhị vô số, nhụy bầu dưới 5 lá noãn'],
 ans:1,
 explain:'Đọc hoa thức: K=Calyx (đài), C=Corolla (tràng), A=Androecium (nhị), G=Gynoecium (nhụy). G(5) = 5 lá noãn hợp, bầu trên. Dấu ngoặc () = hợp, không ngoặc = rời, G với gạch dưới = bầu dưới.'},

{id:20,sec:'TV3',level:'easy',topic:'Hoa',
 text:'Cụm hoa vô hạn (racemose inflorescence) khác với cụm hoa hữu hạn (cymose) ở điểm:',
 opts:['A. Trục chính hữu hạn, các nhánh nở từ trên xuống','B. Trục chính không xác định, hoa nở từ dưới lên trên hoặc từ ngoài vào trong','C. Chỉ có một hoa ở đỉnh trục','D. Hoa nở theo kiểu xen kẽ'],
 ans:1,
 explain:'Cụm hoa vô hạn: trục chính tăng trưởng không hạn định (không có hoa tận cùng), hoa nở từ dưới lên hoặc từ ngoài vào giữa. Cụm hữu hạn: trục chính kết thúc bằng hoa, nở từ trên xuống hoặc từ giữa ra ngoài.'},

{id:21,sec:'TV3',level:'medium',topic:'Hoa',
 text:'Hoa đồ của họ Đậu (Fabaceae) phân lớp Hoa hồng thể hiện hoa có kiểu đối xứng nào?',
 opts:['A. Đối xứng tỏa tròn (actinomorphic)','B. Đối xứng hai bên (zygomorphic)','C. Không đối xứng','D. Đối xứng bốn phần'],
 ans:1,
 explain:'Hoa họ Đậu (Fabaceae) có đối xứng hai bên (zygomorphic) – đặc trưng bởi cánh hoa dạng "cờ – chèo – thuyền". Mnemonic: "Cờ – Chèo – Thuyền – Quả đậu".'},

{id:22,sec:'TV3',level:'medium',topic:'Hoa',
 text:'Nhị hoa họ Bầu bí (Cucurbitaceae) có đặc điểm:',
 opts:['A. 10 nhị tự do','B. 5 nhị, chỉ nhị dính thành bó','C. 3 nhị, 2 cặp dính nhau và 1 nhị tự do','D. Nhị vô số, tự do'],
 ans:2,
 explain:'Họ Bầu bí: 5 nhị, nhưng thực chất là 3 đơn vị: 2 cặp nhị dính nhau (4 nhị) + 1 nhị đơn độc tự do = tổng 5 nhị. Trên hoa đồ biểu diễn là 3 khối nhị.'},

{id:23,sec:'TV3',level:'medium',topic:'Quả hạt',
 text:'Quả mọng (berry) khác quả hạch (drupe) ở chỗ:',
 opts:['A. Quả mọng có nhiều hạt, quả hạch chỉ có một hạt','B. Quả mọng có toàn bộ vỏ quả nạc mọng; quả hạch có nội quả bì hóa cứng','C. Quả mọng không có hạt','D. Quả hạch không thể ăn được'],
 ans:1,
 explain:'Quả mọng (berry): toàn bộ vỏ quả đều nạc (ngoại, trung và nội quả bì đều mềm). Quả hạch (drupe): nội quả bì hóa cứng thành hạch (stone), ví dụ: đào, mận, dừa.'},

{id:24,sec:'TV3',level:'medium',topic:'Quả hạt',
 text:'Kiểu đính noãn "đính noãn bên" (parietal placentation) đặc trưng cho họ nào?',
 opts:['A. Họ Cải (Brassicaceae)','B. Họ Bầu bí (Cucurbitaceae)','C. Họ Hoa tím (Violaceae)','D. Cả B và C'],
 ans:3,
 explain:'Đính noãn bên (parietal): noãn đính trên vách bầu nhụy (không ở trục giữa). Gặp ở họ Hoa tím (Violaceae) và họ Bầu bí (Cucurbitaceae). Họ Cải: đính noãn trên giá noãn dọc theo vách ngăn.'},

{id:25,sec:'TV3',level:'hard',topic:'Hoa',
 text:'Hoa thức chuẩn của họ Cà phê (Rubiaceae) là:',
 opts:['A. ✶ K(4) C(4) A4 G(2)̄','B. ✶ K(5) C(5) A5 G(2)̄','C. ↑ K5 C(5) A(9)+1 G(1)','D. ✶ K(4-5) C(4-5) A4-5 G(5)'],
 ans:1,
 explain:'Họ Cà phê (Rubiaceae): hoa đều, K(5) C(5) A5 G(2) bầu dưới. Đặc điểm: lá đối có lá kèm, hoa mẫu 5, bầu dưới. Đại diện: Cà phê, Cây ipecac (Carapichea ipecacuanha).'},

{id:26,sec:'TV3',level:'hard',topic:'Hoa',
 text:'Đặc điểm "hoa lưỡng tính, đều, mẫu 3, bầu trên 3 ô" đặc trưng cho lớp nào trong Ngành Ngọc lan?',
 opts:['A. Lớp Ngọc lan (Magnoliopsida) – hai lá mầm','B. Lớp Hành (Liliopsida) – một lá mầm','C. Cả hai lớp','D. Không lớp nào'],
 ans:1,
 explain:'Lớp Hành (Liliopsida – một lá mầm): hoa thường đều, mẫu 3 (6 bao hoa, 6 nhị, 3 lá noãn). Lớp Ngọc lan (hai lá mầm): hoa mẫu 4-5, đài và tràng phân biệt.'},

{id:27,sec:'TV3',level:'easy',topic:'Quả hạt',
 text:'Hạt gồm mấy phần chính?',
 opts:['A. 2 phần: vỏ hạt và phôi','B. 3 phần: vỏ hạt, nội nhũ và phôi','C. 4 phần: vỏ hạt, ngoại nhũ, nội nhũ và phôi','D. 2 phần: vỏ hạt và nội nhũ'],
 ans:1,
 explain:'Hạt gồm 3 phần: (1) Vỏ hạt (testa) từ vỏ noãn biến đổi; (2) Nội nhũ (endosperm) – mô dự trữ; (3) Phôi (embryo) – cây con thu nhỏ. Một số hạt không có nội nhũ (đậu, lạc).'},

{id:28,sec:'TV3',level:'medium',topic:'Quả hạt',
 text:'Quả đại (follicle) và quả đậu (legume) khác nhau ở điểm nào?',
 opts:['A. Quả đại chỉ có 1 tâm bì; quả đậu có 2 tâm bì','B. Quả đại nứt theo 1 đường; quả đậu nứt theo 2 đường (bụng và lưng)','C. Quả đại là quả thịt; quả đậu là quả khô','D. Quả đại có nhiều hạt; quả đậu chỉ có 1 hạt'],
 ans:1,
 explain:'Quả đại (follicle): 1 tâm bì, chỉ nứt theo 1 đường (đường bụng). Quả đậu (legume/pod): 1 tâm bì, nứt theo 2 đường (bụng và lưng). Ví dụ quả đại: Trúc đào. Ví dụ quả đậu: Đậu xanh.'},

// ===== TV4: NẤM (5 câu) =====
{id:29,sec:'TV4',level:'easy',topic:'Nấm',
 text:'Nấm khác thực vật bậc cao ở đặc điểm cơ bản nào?',
 opts:['A. Nấm không có lục lạp, không tự tổng hợp được chất hữu cơ (dị dưỡng)','B. Nấm không có nhân tế bào','C. Nấm không có tế bào','D. Nấm chỉ sinh sản bằng bào tử'],
 ans:0,
 explain:'Nấm là sinh vật dị dưỡng – không có lục lạp, không quang hợp được. Nấm hấp thu chất hữu cơ từ môi trường qua thành tế bào. Thành tế bào nấm chứa chitin (khác cellulose của TV).'},

{id:30,sec:'TV4',level:'easy',topic:'Nấm',
 text:'Cơ thể sinh dưỡng của đa số nấm là:',
 opts:['A. Tản (thallus)','B. Sợi nấm (hyphae) tạo thành hệ sợi nấm (mycelium)','C. Rễ thật, thân thật, lá thật','D. Tế bào đơn độc'],
 ans:1,
 explain:'Cơ thể sinh dưỡng nấm là hệ sợi nấm (mycelium) gồm các sợi nấm (hyphae). Sợi nấm có thể có vách ngăn (nấm cao) hoặc không có vách ngăn (nấm thấp/oomycetes).'},

{id:31,sec:'TV4',level:'medium',topic:'Nấm',
 text:'Nấm Mốc xanh Penicillium có ý nghĩa dược học vì:',
 opts:['A. Dùng làm thực phẩm','B. Sản xuất penicillin – kháng sinh đầu tiên','C. Dùng làm men rượu','D. Chứa chất chống oxy hóa'],
 ans:1,
 explain:'Penicillium notatum (mốc xanh) là nguồn penicillin – kháng sinh đầu tiên được Alexander Fleming phát hiện năm 1928. Đây là ứng dụng dược quan trọng của nấm.'},

{id:32,sec:'TV4',level:'medium',topic:'Nấm',
 text:'Địa y (lichen) là mối cộng sinh giữa:',
 opts:['A. Hai loài nấm khác nhau','B. Nấm (mycobiont) và tảo hoặc vi khuẩn lam (photobiont)','C. Nấm và vi khuẩn đất','D. Tảo và vi khuẩn lam'],
 ans:1,
 explain:'Địa y là cộng sinh bắt buộc: Nấm (mycobiont, thường Ascomycota) cung cấp kết cấu, giữ nước, bảo vệ; Tảo xanh hoặc Vi khuẩn lam (photobiont) quang hợp cung cấp dinh dưỡng.'},

{id:33,sec:'TV4',level:'hard',topic:'Nấm',
 text:'Nấm Linh chi (Ganoderma lucidum) thuộc nhóm phân loại nào và bộ phận làm thuốc chính là gì?',
 opts:['A. Ascomycota; thể quả (fruiting body)','B. Basidiomycota; thể quả (fruiting body)','C. Zygomycota; sợi nấm','D. Deuteromycota; bào tử'],
 ans:1,
 explain:'Linh chi (Ganoderma lucidum) thuộc Basidiomycota (nấm đảm). Bộ phận làm thuốc là thể quả (mũ nấm) chứa polysaccharide (beta-glucan), triterpenoid, adenosine.'},

// ===== TV5: RÊU QUYẾT THÔNG (4 câu) =====
{id:34,sec:'TV5',level:'easy',topic:'Rêu Quyết',
 text:'Ngành Quyết (Pteridophyta) khác ngành Rêu (Bryophyta) ở đặc điểm nào?',
 opts:['A. Quyết không có bào tử; Rêu có bào tử','B. Quyết có hệ mạch dẫn thật; Rêu không có hệ mạch dẫn','C. Quyết không có diệp lục; Rêu có diệp lục','D. Quyết là thực vật bậc cao nhất; Rêu là thực vật bậc thấp nhất'],
 ans:1,
 explain:'Quyết (Pteridophyta): có hệ mạch dẫn thật (tracheid/vessel), thể bào tử chiếm ưu thế. Rêu (Bryophyta): không có mạch dẫn thật (chỉ có tế bào dẫn nguyên thủy), thể giao tử chiếm ưu thế.'},

{id:35,sec:'TV5',level:'medium',topic:'Thông',
 text:'Đặc điểm phân biệt Hạt trần (Gymnospermae) và Hạt kín (Angiospermae) là:',
 opts:['A. Hạt trần có hạt; Hạt kín không có hạt','B. Hạt trần có hạt không bọc trong quả (noãn trần); Hạt kín có hạt bọc trong quả','C. Hạt trần chỉ có cây lá kim; Hạt kín gồm cây lá rộng','D. Hạt trần có hoa; Hạt kín không có hoa'],
 ans:1,
 explain:'Hạt trần (Gymnospermae): noãn và hạt trần, không được bảo vệ bởi bầu nhụy (không có quả thật). Hạt kín (Angiospermae): noãn được bọc trong bầu nhụy, hạt nằm trong quả.'},

{id:36,sec:'TV5',level:'medium',topic:'Quyết',
 text:'Dương xỉ (phân lớp Dương xỉ - Filicidae) được sử dụng làm thuốc chủ yếu ở bộ phận nào?',
 opts:['A. Lá (tán lá)','B. Thân rễ (rhizome)','C. Bào tử (spore)','D. Rễ'],
 ans:1,
 explain:'Dương xỉ làm thuốc chủ yếu dùng thân rễ (rhizome). Ví dụ: Cốt toái bổ (Drynaria fortunei), Cu li (Cibotium barometz) – thân rễ phủ lông vàng. Thân rễ chứa nhiều alcaloid, tanin.'},

{id:37,sec:'TV5',level:'hard',topic:'Thông',
 text:'Lớp Thông (Pinopsida) có đặc điểm sinh sản đặc trưng:',
 opts:['A. Thụ phấn nhờ nước, thụ tinh kép','B. Hạt phấn có túi khí, thụ tinh đơn (không thụ tinh kép)','C. Có hoa thật với đài, tràng, nhị, nhụy','D. Noãn được bọc hoàn toàn trong bầu nhụy'],
 ans:1,
 explain:'Thông (Pinopsida): hạt phấn thường có 2 túi khí (sacci) giúp phát tán qua không khí; thụ tinh đơn (không có thụ tinh kép như Hạt kín). Noãn trần trên vảy noãn (megasporophyll).'},

// ===== TV6: PHÂN LOẠI THỰC VẬT NGÀNH NGỌC LAN (28 câu) =====
// Lớp Ngọc Lan – Phân lớp Ngọc Lan
{id:38,sec:'TV6',level:'easy',topic:'Họ Mộc Lan – Magnoliaceae',
 text:'Đặc điểm nhận diện nhanh họ Mộc Lan (Magnoliaceae) là:',
 opts:['A. Lá đối, có lá kèm vòng ôm lấy chồi, hoa nhiều lá noãn xoắn ốc','B. Lá cách, không có lá kèm, hoa 4 cánh chéo','C. Lá mọc vòng, hoa mẫu 3, quả đậu','D. Lá có gai, hoa mẫu 5, quả mọng'],
 ans:0,
 explain:'Họ Mộc Lan (Magnoliaceae): lá đơn cách, có lá kèm vòng bao quanh chồi (để lại vết sẹo vòng trên thân), hoa lớn đơn độc, bao hoa nhiều mảnh xoắn ốc, nhị nhiều. Đại diện: Mộc lan, Hoa hiên, Ngọc lan.'},

{id:39,sec:'TV6',level:'easy',topic:'Họ Hoa Hồng – Rosaceae',
 text:'Đặc điểm hoa đồ đặc trưng của họ Hoa Hồng (Rosaceae) là:',
 opts:['A. K(5) C5 A∞ G(∞) bầu dưới','B. K5 C5 A∞ G(1) đến G∞, bầu trên','C. K(4) C4 A6 G(1) bầu trên','D. ✶ K5 C0 A5 G(5) bầu dưới'],
 ans:1,
 explain:'Họ Hoa Hồng (Rosaceae): K5 C5 A∞ G(1)–G∞, bầu trên (trừ một số chi có bầu dưới như táo, lê). Đặc điểm: đế hoa lõm (hypanthium), lá kèm, nhị nhiều. Đại diện: Hoa hồng, Mâm xôi, Mơ, Đào.'},

{id:40,sec:'TV6',level:'medium',topic:'Họ Đậu – Fabaceae',
 text:'Hoa "cờ – chèo – thuyền" đặc trưng cho phân họ nào trong họ Đậu (Fabaceae)?',
 opts:['A. Phân họ Đậu gai (Mimosoideae)','B. Phân họ Vang (Caesalpinioideae)','C. Phân họ Đậu (Faboideae = Papilionoideae)','D. Tất cả các phân họ'],
 ans:2,
 explain:'Phân họ Faboideae (Đậu): 1 cánh cờ lớn, 2 cánh chèo, 2 cánh thuyền (kín bao nhị và nhụy) → hoa cánh bướm. Đại diện thuốc: Cam thảo (Glycyrrhiza), Hòe (Sophora), Sắn dây (Pueraria).'},

{id:41,sec:'TV6',level:'medium',topic:'Họ Cải – Brassicaceae',
 text:'Nhị hoa họ Cải (Brassicaceae) có đặc điểm nhận biết:',
 opts:['A. Nhị vô số, tự do','B. 6 nhị, 4 dài 2 ngắn (tứ cường)','C. 5 nhị, dính thành ống','D. 3 nhị, 2 nhị có 2 bao phấn'],
 ans:1,
 explain:'Họ Cải: 6 nhị tứ cường (tetradynamous) – 4 nhị dài + 2 nhị ngắn. Hoa thức: ✶ K2+2 C4 A2+4 G(2). Cánh hoa 4 xếp chéo. Đại diện thuốc: Cải canh, Mù tạt (Sinapis), Độc hành.'},

{id:42,sec:'TV6',level:'medium',topic:'Họ Cẩm Chướng – Caryophyllaceae',
 text:'Đặc điểm nhận diện nhanh họ Cẩm Chướng (Caryophyllaceae) là:',
 opts:['A. Thân vuông, lá đối không cuống, khớp phình ở mấu, hoa mẫu 5','B. Thân tròn, lá mọc cách, hoa mẫu 3','C. Lá có lá kèm, hoa dạng cờ chèo thuyền','D. Lá kép, hoa mẫu 4, quả loại giác'],
 ans:0,
 explain:'Họ Cẩm Chướng (Caryophyllaceae): thân tròn (khác Lamiaceae vuông), MẤU PHÌNH (đặc trưng), lá đối không cuống, hoa mẫu 5. Lỗ khí kiểu Trực bào (diacytic). Đại diện: Cẩm chướng, Tẩm thảo, Vương tùng.'},

{id:43,sec:'TV6',level:'medium',topic:'Họ Bầu Bí – Cucurbitaceae',
 text:'Tua cuốn của cây họ Bầu Bí (Cucurbitaceae) là biến dạng của bộ phận nào?',
 opts:['A. Lá kèm','B. Lá','C. Cành','D. Rễ phụ'],
 ans:2,
 explain:'Tua cuốn của họ Bầu Bí là cành biến dạng (nằm cạnh lá, đối diện lá theo một số tài liệu nằm đối diện với vị trí phát sinh nhánh). Cây Lạc tiên (Passiflora) cũng có tua cuốn là cành biến dạng.'},

// Phân lớp Hoàng Liên
{id:44,sec:'TV6',level:'easy',topic:'Họ Hoàng Liên – Ranunculaceae',
 text:'Đặc điểm nổi bật của họ Hoàng Liên (Ranunculaceae) về cấu tạo hoa:',
 opts:['A. Hoa đều, bao hoa không phân hóa đài tràng, nhị ít','B. Hoa đều hoặc không đều, bao hoa thường nhiều mảnh xoắn ốc, nhị nhiều, lá noãn nhiều rời','C. Hoa đều, đài 5 xanh, tràng 5 màu, nhị 10','D. Hoa không đều, mẫu 3, bầu dưới'],
 ans:1,
 explain:'Họ Hoàng Liên (Ranunculaceae): hoa đều hoặc không đều, bao hoa nhiều mảnh xoắn ốc (nguyên thủy), nhị nhiều, lá noãn nhiều rời → quả đại hoặc quả bế. Đại diện thuốc: Hoàng liên (Coptis), Ô đầu (Aconitum), Thăng ma (Cimicifuga).'},

{id:45,sec:'TV6',level:'medium',topic:'Họ Tiết Dê – Menispermaceae',
 text:'Đặc điểm phân biệt họ Tiết Dê (Menispermaceae) là:',
 opts:['A. Cây gỗ/dây leo, lá đơn cách không có lá kèm, hoa nhỏ mẫu 3, quả hạch hình móng ngựa','B. Cây thảo, lá kép 3 lá chét, hoa mẫu 5','C. Cây leo, lá đối có lá kèm, hoa mẫu 4','D. Cây gỗ, lá kép lông chim, hoa mẫu 5, quả đậu'],
 ans:0,
 explain:'Họ Tiết Dê (Menispermaceae): cây leo gỗ, lá đơn cách hình tim/khiên, hoa nhỏ mẫu 3, quả hạch hình móng ngựa (endocarp hình móng ngựa). Đại diện thuốc: Phòng kỷ (Stephania), Lá lốt... thực ra Lá lốt là Piperaceae. Đại diện: Bình vôi (Stephania rotunda), Dây đau xương.'},

// Phân lớp Cẩm Chướng
{id:46,sec:'TV6',level:'easy',topic:'Họ Rau Sam – Portulacaceae',
 text:'Họ Rau Sam (Portulacaceae) có đặc điểm nhận biết:',
 opts:['A. Cây mọng nước, đài 2 mảnh đặc trưng, tràng 5, nhụy bầu trên hoặc nửa dưới','B. Cây thảo, đài 5, tràng 4, nhị 6 tứ cường','C. Cây leo, lá đối, hoa mẫu 3','D. Cây gỗ, hoa đơn tính, quả hạch'],
 ans:0,
 explain:'Họ Rau Sam (Portulacaceae): cây thảo mọng nước, đặc trưng đài CHỈ 2 MẢNH (khác đa số họ khác). Rau sam (Portulaca oleracea) có tác dụng kháng khuẩn. Tràng 5, nhị nhiều.'},

// Phân lớp Sổ
{id:47,sec:'TV6',level:'medium',topic:'Họ Sổ – Dilleniaceae',
 text:'Quả của họ Sổ (Dilleniaceae) thuộc kiểu:',
 opts:['A. Quả đậu','B. Quả mọng','C. Quả đại (follicle) bao quanh bởi đài tồn tại','D. Quả hạch'],
 ans:2,
 explain:'Họ Sổ (Dilleniaceae): quả đại (follicle) hoặc quả mọng giả, thường được bao quanh bởi đài tồn tại và phình to. Đại diện: Sổ (Dillenia indica) – đài phình to thịt ăn được bao quanh quả.'},

// Phân lớp Hoa Hồng
{id:48,sec:'TV6',level:'medium',topic:'Họ Cam – Rutaceae',
 text:'Đặc điểm đặc trưng của họ Cam (Rutaceae) để nhận biết nhanh:',
 opts:['A. Lá có tuyến tinh dầu trong mờ, thân có gai, quả Hesperidium','B. Lá không có tuyến tinh dầu, hoa mẫu 3','C. Cây thảo không có gai, hoa mẫu 4','D. Lá kép, không có tuyến tinh dầu'],
 ans:0,
 explain:'Họ Cam (Rutaceae): lá có tuyến tinh dầu nhìn thấy qua ánh sáng (soi ngược ánh sáng thấy điểm trong mờ), thân có gai, quả cam (hesperidium). Đại diện: Cam, Chanh, Bưởi, Quít (Citrus), Hoàng bá (Phellodendron).'},

{id:49,sec:'TV6',level:'medium',topic:'Họ Thầu Dầu – Euphorbiaceae',
 text:'Đặc điểm mủ trắng (latex) đặc trưng ở họ Thầu Dầu (Euphorbiaceae) có trong bộ phận nào?',
 opts:['A. Chỉ trong hạt','B. Trong ống nhựa mủ (laticifer) ở toàn thân, rễ, lá','C. Chỉ trong vỏ cây','D. Chỉ trong quả'],
 ans:1,
 explain:'Euphorbiaceae: có ống nhựa mủ (laticifer) phân nhánh hoặc không phân nhánh chạy suốt toàn cây → mủ trắng (latex) chứa terpene, alcaloid. Đại diện: Thầu dầu (Ricinus), Cao su (Hevea), Sắn (Manihot), Đại kích (Euphorbia).'},

{id:50,sec:'TV6',level:'hard',topic:'Họ Hoa Tán – Apiaceae',
 text:'Cụm hoa đặc trưng của họ Hoa Tán (Apiaceae – Umbelliferae) là:',
 opts:['A. Chùm đơn','B. Tán kép (compound umbel)','C. Đầu (capitulum)','D. Bông (spike)'],
 ans:1,
 explain:'Họ Hoa Tán (Apiaceae): cụm hoa TÁN KÉP (compound umbel) – tán lớn gồm nhiều tán nhỏ. Thường có tổng bao (involucre) và tiểu tổng bao. Đại diện thuốc: Thì là (Anethum), Tiểu hồi (Foeniculum), Bạch chỉ (Angelica), Cà rốt (Daucus), Đương quy (Angelica sinensis).'},

{id:51,sec:'TV6',level:'medium',topic:'Họ Long Não – Lauraceae',
 text:'Họ Long Não (Lauraceae) được nhận biết bởi:',
 opts:['A. Lá đối, mạng gân lông chim, không thơm, hoa mẫu 3','B. Lá cách, mạng gân lông chim, thơm tinh dầu, hoa mẫu 3, bao phấn mở bằng nắp','C. Lá kép, hoa mẫu 4, quả đậu dẹp','D. Lá đơn cách, không thơm, hoa mẫu 5'],
 ans:1,
 explain:'Họ Long Não (Lauraceae): đặc điểm nhận dạng = Lá thơm tinh dầu + Hoa mẫu 3 (K+C=6 bao hoa, A=9+3) + Bao phấn MỞ BẰNG NẮP (poricidal/valvate dehiscence). Đại diện: Long não (Cinnamomum), Quế (Cinnamomum cassia), Bời lời.'},

// Phân lớp Bạc Hà
{id:52,sec:'TV6',level:'easy',topic:'Họ Hoa Môi – Lamiaceae',
 text:'Mnemonic "Vuông – Đối – Môi – Thơm" tương ứng với đặc điểm nào của họ Hoa Môi (Lamiaceae)?',
 opts:['A. Thân vuông, lá đối, hoa môi (zygomorphic 2 môi), tinh dầu thơm','B. Thân tròn, lá đối, hoa môi, tinh dầu','C. Thân vuông, lá cách, hoa đều, tinh dầu','D. Thân vuông, lá vòng, hoa môi, không có tinh dầu'],
 ans:0,
 explain:'Lamiaceae: Vuông=thân 4 cạnh, Đối=lá đối chéo chữ thập, Môi=hoa không đều 2 môi trên-dưới (zygomorphic), Thơm=tinh dầu. Nhụy 4 nhị tứ cường. Đại diện: Bạc hà (Mentha), Hương nhu (Ocimum), Ích mẫu (Leonurus), Tía tô.'},

{id:53,sec:'TV6',level:'medium',topic:'Họ Cà – Solanaceae',
 text:'Đặc điểm hoa thức đúng của họ Cà (Solanaceae):',
 opts:['A. ✶ K(5) C(5) A5 G(2)','B. ✶ K5 C5 A∞ G(2)','C. ↑ K(5) C(5) A4 G(2)','D. ✶ K(4) C(4) A4 G(1)'],
 ans:0,
 explain:'Họ Cà (Solanaceae): ✶ K(5) C(5) A5 G(2). Đặc điểm: hoa đều, tràng hợp 5 cánh, 5 nhị đính trên tràng xen kẽ thùy tràng, bầu 2 ô bầu trên. Đại diện: Cà độc dược (Datura), Cà trứng, Thuốc lá (Nicotiana), Ớt (Capsicum), Khoai tây.'},

{id:54,sec:'TV6',level:'medium',topic:'Họ Mã Tiền – Loganiaceae',
 text:'Cây Mã tiền (Strychnos nux-vomica) thuộc họ nào và hoạt chất chính là gì?',
 opts:['A. Họ Cà phê (Rubiaceae) – cafein','B. Họ Mã tiền (Loganiaceae) – strychnin và brucin','C. Họ Long đởm (Gentianaceae) – gentiopicrin','D. Họ Trúc đào (Apocynaceae) – digitalin'],
 ans:1,
 explain:'Mã tiền (Strychnos nux-vomica) thuộc họ Loganiaceae. Hạt chứa alcaloid strychnin (độc cực mạnh) và brucin. Strychnin gây co giật kiểu uốn ván. Bộ phận dùng: hạt (chế biến kỹ trước khi dùng).'},

// Phân lớp Cúc
{id:55,sec:'TV6',level:'easy',topic:'Họ Cúc – Asteraceae',
 text:'Cụm hoa đầu (capitulum) của họ Cúc (Asteraceae) gồm mấy loại hoa?',
 opts:['A. Chỉ 1 loại: hoa ống','B. Chỉ 1 loại: hoa lưỡi','C. 2 loại: hoa ống ở giữa và hoa lưỡi ở ngoài rìa (hoặc chỉ một loại)','D. 3 loại: hoa ống, hoa lưỡi, hoa môi'],
 ans:2,
 explain:'Họ Cúc (Asteraceae): đầu hoa thường có hoa LƯỠI ở ngoài rìa (hoa cái, trang trí) + hoa ỐNG ở trung tâm (lưỡng tính, thụ phấn). Một số chi chỉ có hoa ống (Cỏ lào – Chromolaena) hoặc chỉ hoa lưỡi (Bồ công anh – Taraxacum).'},

{id:56,sec:'TV6',level:'medium',topic:'Họ Cúc – Asteraceae',
 text:'Đặc điểm nhị hoa trong đầu hoa họ Cúc (Asteraceae) là:',
 opts:['A. Nhị tự do, 5 nhị','B. 5 nhị, chỉ nhị dính thành ống bao quanh vòi nhụy','C. Nhị nhiều, tự do','D. Chỉ có 1 nhị'],
 ans:1,
 explain:'Asteraceae: 5 nhị, chỉ nhị (filament) tự do nhưng BAO PHẤN (anther) dính lại thành ống bao quanh vòi nhụy (syngenecious stamens). Vòi nhụy xuyên qua ống bao phấn và đẩy phấn ra ngoài (thụ phấn thứ cấp). Đại diện thuốc: Ngải cứu, Cúc hoa, Bồ công anh, Kim ngân... (Kim ngân là Caprifoliaceae).'},

{id:57,sec:'TV6',level:'hard',topic:'Họ Cúc – Asteraceae',
 text:'Artichoke (Cynara scolymus) – bộ phận làm thuốc và hoạt chất chính:',
 opts:['A. Hoa (đầu hoa chưa nở) – cynarin và acid chlorogenic, hỗ trợ gan, lợi mật','B. Rễ – inulin, chữa tiểu đường','C. Lá – tinh dầu, kháng khuẩn','D. Hạt – dầu béo, hạ cholesterol'],
 ans:0,
 explain:'Actisô (Cynara scolymus – Asteraceae): Lá và đầu hoa chứa CYNARIN (acid 1,5-dicaffeoylquinic), acid chlorogenic, flavonoid. Tác dụng: bảo vệ gan, lợi mật, hạ cholesterol. Bộ phận dùng làm thuốc: lá.'},

// Lớp Hành – Ráy, Cau, Lúa, Gừng, Lan
{id:58,sec:'TV6',level:'easy',topic:'Họ Ráy – Araceae',
 text:'Cụm hoa đặc trưng của họ Ráy (Araceae) là:',
 opts:['A. Tán kép','B. Mo (spathe) và bông mo (spadix)','C. Đầu hoa (capitulum)','D. Chùm (raceme)'],
 ans:1,
 explain:'Araceae: cụm hoa bông mo (SPADIX) bao bọc bởi MO (SPATHE) lớn màu sắc. Hoa nhỏ không cuống trên trục. Đại diện thuốc: Bán hạ (Typhonium trilobatum), Bèo cái (Pistia), Vạn niên thanh (Aglaonema).'},

{id:59,sec:'TV6',level:'easy',topic:'Họ Cau – Arecaceae',
 text:'Đặc điểm nhận biết họ Cau (Arecaceae = Palmae) là:',
 opts:['A. Cây thảo nhỏ, lá kim, hoa mẫu 3','B. Cây gỗ thân cột không phân nhánh, lá kép lông chim hoặc chân vịt, hoa mẫu 3, quả hạch','C. Cây leo, lá đơn, hoa mẫu 6','D. Cây thân ngầm, lá mọc thẳng từ thân rễ, hoa mẫu 4'],
 ans:1,
 explain:'Arecaceae (Họ Cau): Thân cột không phân nhánh, lá kép lông chim (cau, dừa) hoặc chân vịt (thốt nốt), hoa mẫu 3 (3 đài, 3 tràng, 6 nhị, 3 lá noãn), quả hạch. Đại diện: Cau (Areca catechu), Dừa (Cocos nucifera).'},

{id:60,sec:'TV6',level:'medium',topic:'Họ Lúa – Poaceae',
 text:'Hoa của họ Lúa (Poaceae) được bảo vệ bởi:',
 opts:['A. Đài và tràng hoa thật','B. Mày hoa ngoài (lemma), mày hoa trong (palea) và vảy hoa (lodicule)','C. Bao hoa 6 mảnh','D. Lá bắc lớn có màu'],
 ans:1,
 explain:'Lúa (Poaceae): không có đài và tràng thật. Hoa được bảo vệ bởi: Mày ngoài (lemma) và mày trong (palea). Khi hoa nở, vảy hoa (lodicule) trương to đẩy lemma và palea mở ra. Đại diện: Lúa (Oryza), Ngô (Zea), Tre.'},

{id:61,sec:'TV6',level:'medium',topic:'Họ Gừng – Zingiberaceae',
 text:'Mnemonic nhận diện họ Gừng (Zingiberaceae): "Thân giả – Thơm – Một nhị – Môi lớn". Trong đó "Một nhị" có nghĩa là:',
 opts:['A. Hoa chỉ có 1 nhị tự do hoàn toàn','B. Chỉ có 1 nhị sinh sản (fertile stamen), các nhị còn lại biến thành cánh môi (labellum) và nhị lép','C. Hoa không có nhị','D. Nhị và nhụy hợp thành 1 cột'],
 ans:1,
 explain:'Zingiberaceae: chỉ có 1 nhị sinh sản thật, nhị đối diện với môi thường dính thành ống. Các nhị còn lại biến thành MÔI (labellum) lớn màu sắc (cánh đẹp nhất thấy được) và 2 nhị lép nhỏ. Đại diện: Gừng (Zingiber), Nghệ (Curcuma), Sa nhân (Amomum), Riềng (Alpinia).'},

{id:62,sec:'TV6',level:'medium',topic:'Họ Lan – Orchidaceae',
 text:'Đặc điểm đặc trưng nhất của hoa họ Lan (Orchidaceae) là:',
 opts:['A. Hoa mẫu 3, bao hoa 6, nhị và nhụy HỢP thành CỘT (gynostemium/column)','B. Hoa mẫu 4, cánh hoa 4 xếp chéo','C. Hoa mẫu 5, nhị 10 tự do','D. Hoa có bao hoa không phân hóa, nhị nhiều'],
 ans:0,
 explain:'Orchidaceae: đặc điểm độc đáo là nhị và nhụy HỢP thành CỘT (column/gynostemium). Bao hoa 6 (3+3), cánh môi (labellum) biến dạng là 1 trong 3 cánh tràng. Hạt phấn kết thành khối phấn (pollinium). Đại diện thuốc: Thạch hộc (Dendrobium).'},

{id:63,sec:'TV6',level:'medium',topic:'Họ Hành – Liliaceae',
 text:'Họ Hành (Liliaceae s.l.) có hoa thức:',
 opts:['A. ✶ P3+3 A3+3 G(3)','B. ✶ K3 C3 A6 G(3)','C. ↑ P6 A3 G(3)','D. ✶ P2+2 A4 G(2)'],
 ans:0,
 explain:'Liliaceae (nghĩa rộng): ✶ P3+3 A3+3 G(3). Bao hoa 6 mảnh (2 vòng x 3, không phân biệt đài tràng = P), 6 nhị (2 vòng x 3), nhụy 3 lá noãn hợp bầu trên. Đại diện: Hành (Allium), Tỏi (Allium sativum), Lô hội (Aloe), Thiên môn (Asparagus).'},

{id:64,sec:'TV6',level:'hard',topic:'Họ Củ Nâu – Dioscoreaceae',
 text:'Củ nâu (Dioscorea) được dùng làm nguồn nguyên liệu tổng hợp thuốc nào?',
 opts:['A. Penicillin – kháng sinh','B. Diosgenin – tiền chất tổng hợp steroid hormone (cortisone, estrogen)','C. Digitalin – thuốc trợ tim','D. Morphin – giảm đau'],
 ans:1,
 explain:'Dioscoreaceae: Củ nâu (Dioscorea) chứa DIOSGENIN (saponin steroid). Diosgenin là tiền chất bán tổng hợp cortisone, progesterone, estrogen và các steroid hormone. Đây là ứng dụng dược liệu quan trọng.'},

// ======================== TRẠNG THÁI ========================
const state = {
  answers: {}, // id → index chọn
  checked: {}, // id → true/false/null
  flagged: new Set(),
  correct: 0, wrong: 0,
  filterSec: 'all',
  timerSeconds: 60 * 60,
  timerInterval: null,
  started: false
};

// ======================== TIMER ========================
function startTimer() {
  if (state.timerInterval) return;
  state.timerInterval = setInterval(() => {
    state.timerSeconds--;
    updateTimerDisplay();
    if (state.timerSeconds <= 0) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      setTimeout(() => { alert('⏰ Hết giờ! Thời gian 60 phút đã kết thúc.'); showSummary(); }, 100);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(state.timerSeconds / 60);
  const s = state.timerSeconds % 60;
  const el = document.getElementById('timer-display');
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  el.className = 'timer-display';
  if (state.timerSeconds <= 300) el.classList.add('danger');
  else if (state.timerSeconds <= 600) el.classList.add('warning');
}

// ======================== RENDER ========================
const SEC_LABELS = {
  TV1: { icon: '🔬', label: 'TV1 · Tế Bào & Mô', q: 8 },
  TV2: { icon: '🌱', label: 'TV2 · Rễ – Thân – Lá', q: 10 },
  TV3: { icon: '🌸', label: 'TV3 · Hoa – Quả – Hạt', q: 10 },
  TV4: { icon: '🍄', label: 'TV4 · Nấm', q: 5 },
  TV5: { icon: '🌿', label: 'TV5 · Rêu Quyết Thông', q: 4 },
  TV6: { icon: '📚', label: 'TV6 · Phân Loại Ngọc Lan', q: 28 },
  TV7: { icon: '🌳', label: 'TV7 · Câu Hỏi Tổng Hợp Cây Cụ Thể', q: 10 }
};

function renderAll() {
  const container = document.getElementById('quiz-container');
  const filtered = questions.filter(q => state.filterSec === 'all' || q.sec === state.filterSec);
  let currentSec = null;
  let html = '';
  filtered.forEach(q => {
    if (q.sec !== currentSec) {
      currentSec = q.sec;
      const s = SEC_LABELS[currentSec];
      html += `<div class="sec-heading"><span class="sec-icon">${s.icon}</span><span class="sec-title">${s.label}</span><span class="sec-badge">${s.q} câu</span></div>`;
    }
    html += buildCardHTML(q);
  });
  container.innerHTML = html;
  updateStats();
}

function buildCardHTML(q) {
  const checked = state.checked[q.id];
  const ans = state.answers[q.id];
  const isFlagged = state.flagged.has(q.id);
  const cardClass = checked === true ? 'q-card answered-correct' : checked === false ? 'q-card answered-wrong' : isFlagged ? 'q-card flagged' : 'q-card';
  const levelLabel = q.level === 'easy' ? 'Nhận biết' : q.level === 'medium' ? 'Thông hiểu' : 'Vận dụng';
  const levelClass = q.level;

  let optsHtml = '<div class="opts">';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    let optClass = 'opt';
    if (checked !== undefined) {
      if (i === q.ans) optClass += ' correct-ans';
      else if (i === ans && checked === false) optClass += ' wrong-ans';
    } else if (ans === i) optClass += ' selected';
    const clickable = checked !== undefined ? '' : `onclick="selectOpt(${q.id},${i})"`;
    optsHtml += `<div class="${optClass}" ${clickable}><span class="opt-label">${letters[i]}</span><span>${opt.replace(/^[A-D]\.\s*/,'')}</span></div>`;
  });
  optsHtml += '</div>';

  const explainHtml = checked !== undefined
    ? `<div class="explanation shown"><strong>${checked?'✅ Đúng!':'❌ Sai!'}</strong> ${q.explain}</div>` : '';

  const footerHtml = checked !== undefined
    ? `<div class="q-footer"><span class="result-icon">${checked?'✅':'❌'}</span></div>`
    : `<div class="q-footer">
         <button class="check-btn" onclick="checkAnswer(${q.id})">✔ Kiểm tra</button>
         <button class="flag-btn ${isFlagged?'flagged':''}" onclick="toggleFlag(${q.id})" title="Đánh dấu">${isFlagged?'🚩':'🏳'}</button>
       </div>`;

  return `<div class="${cardClass}" id="card-${q.id}">
    <div class="q-header">
      <div class="q-num">${q.id}</div>
      <span style="font-size:13px;font-weight:600;color:var(--muted);flex:1">${q.topic}</span>
      <div class="q-tags">
        <span class="tag topic">${q.sec}</span>
        <span class="tag ${levelClass}">${levelLabel}</span>
      </div>
    </div>
    <div class="q-body">
      <div class="q-text">${q.text}</div>
      ${optsHtml}
      ${explainHtml}
    </div>
    ${footerHtml}
  </div>`;
}

// ======================== INTERACTIONS ========================
function selectOpt(id, i) {
  if (state.checked[id] !== undefined) return;
  if (!state.started) { state.started = true; startTimer(); }
  state.answers[id] = i;
  const card = document.getElementById('card-' + id);
  card.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
}

function checkAnswer(id) {
  const q = questions.find(q => q.id === id);
  if (state.answers[id] === undefined) { alert('Vui lòng chọn đáp án trước!'); return; }
  const isCorrect = state.answers[id] === q.ans;
  state.checked[id] = isCorrect;
  if (isCorrect) state.correct++; else state.wrong++;
  state.flagged.delete(id);
  const card = document.getElementById('card-' + id);
  card.outerHTML = buildCardHTML(q);
  updateStats();
}

function toggleFlag(id) {
  if (state.flagged.has(id)) state.flagged.delete(id);
  else state.flagged.add(id);
  const card = document.getElementById('card-' + id);
  const q = questions.find(q => q.id === id);
  card.outerHTML = buildCardHTML(q);
}

function updateStats() {
  const done = Object.keys(state.checked).length;
  document.getElementById('done-count').textContent = done;
  document.getElementById('correct-count').textContent = state.correct;
  document.getElementById('wrong-count').textContent = state.wrong;
  const mc = state.correct + state.wrong;
  document.getElementById('score-pct').textContent = mc > 0 ? Math.round(state.correct/mc*100)+'%' : '—';
  document.getElementById('progress-bar').style.width = Math.round(done/75*100) + '%';
}

function filterSection(sec) {
  state.filterSec = sec;
  document.querySelectorAll('.sflt').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function jumpToNext() {
  const cards = document.querySelectorAll('.q-card');
  for (let card of cards) {
    const id = parseInt(card.id.replace('card-',''));
    if (state.checked[id] === undefined) {
      card.scrollIntoView({behavior:'smooth',block:'center'});
      card.style.outline = '2px solid var(--green-light)';
      setTimeout(() => card.style.outline='', 1500);
      return;
    }
  }
  alert('🎉 Bạn đã làm hết tất cả câu hỏi!');
}

function showFlagged() {
  if (state.flagged.size === 0) { alert('Chưa có câu nào được đánh dấu.'); return; }
  const firstId = [...state.flagged][0];
  const card = document.getElementById('card-' + firstId);
  if (card) card.scrollIntoView({behavior:'smooth', block:'center'});
}

function resetExam() {
  if (!confirm('Bạn có chắc muốn làm lại từ đầu? Toàn bộ câu trả lời sẽ bị xóa.')) return;
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.timerSeconds = 60 * 60;
  state.started = false;
  state.answers = {}; state.checked = {}; state.flagged.clear();
  state.correct = 0; state.wrong = 0;
  updateTimerDisplay();
  renderAll();
}

// ======================== REVIEW GRID ========================
function showReview() {
  let grid = '<div class="review-grid">';
  questions.forEach(q => {
    const checked = state.checked[q.id];
    const isFlagged = state.flagged.has(q.id);
    const cls = checked === true ? 'review-cell done-correct' : checked === false ? 'review-cell done-wrong' : isFlagged ? 'review-cell flagged-cell' : 'review-cell';
    grid += `<div class="${cls}" onclick="goToCard(${q.id});closeModal()">${q.id}</div>`;
  });
  grid += '</div>';

  const done = Object.keys(state.checked).length;
  document.getElementById('modal-content').innerHTML = `
    <h2 style="font-size:16px;font-weight:800;color:var(--green-dark);margin-bottom:10px">📋 Bảng câu hỏi (${done}/75 đã làm)</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;font-size:11px">
      <span>⬜ Chưa làm</span>
      <span style="color:#2dc653">✅ Đúng</span>
      <span style="color:var(--red)">❌ Sai</span>
      <span style="color:var(--gold-dark)">🚩 Đánh dấu</span>
    </div>
    ${grid}
    <button class="modal-btn" onclick="closeModal()" style="margin-top:12px">Đóng</button>
  `;
  document.getElementById('modal-overlay').classList.add('shown');
}

function goToCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) { state.filterSec = 'all'; renderAll(); setTimeout(() => goToCard(id), 100); return; }
  card.scrollIntoView({behavior:'smooth',block:'center'});
  card.style.outline = '2px solid var(--green-light)';
  setTimeout(() => card.style.outline = '', 1500);
}

// ======================== SUMMARY ========================
function showSummary() {
  const mc = state.correct + state.wrong;
  const pct = mc > 0 ? Math.round(state.correct/mc*100) : 0;
  const done = Object.keys(state.checked).length;
  const elapsed = 3600 - state.timerSeconds;
  const em = Math.floor(elapsed/60), es = elapsed%60;

  let grade, color, icon;
  if (pct >= 90) { grade='Xuất sắc'; color='#2dc653'; icon='🏆'; }
  else if (pct >= 80) { grade='Giỏi'; color='#40916c'; icon='🥇'; }
  else if (pct >= 65) { grade='Khá'; color='#e9c46a'; icon='🥈'; }
  else if (pct >= 50) { grade='Trung bình'; color='#f4a261'; icon='📚'; }
  else { grade='Cần cải thiện'; color='#e63946'; icon='💪'; }

  const secBreak = Object.entries(SEC_LABELS).map(([sec, info]) => {
    const qs = questions.filter(q => q.sec === sec && state.checked[q.id] !== undefined);
    const cor = qs.filter(q => state.checked[q.id] === true).length;
    const tot = questions.filter(q => q.sec === sec).length;
    const chk = qs.length;
    const p = chk > 0 ? Math.round(cor/chk*100) : null;
    const barColor = p === null ? '#ddd' : p >= 80 ? '#2dc653' : p >= 60 ? '#e9c46a' : '#e63946';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <span style="font-size:11px;font-weight:700;min-width:90px;color:var(--green-dark)">${sec}</span>
      <div style="flex:1;background:#eee;border-radius:4px;height:6px;overflow:hidden"><div style="width:${p??0}%;background:${barColor};height:100%"></div></div>
      <span style="font-size:11px;color:#555;min-width:40px;text-align:right">${cor}/${tot}</span>
    </div>`;
  }).join('');

  document.getElementById('modal-content').innerHTML = `
    <div style="font-size:48px">${icon}</div>
    <h2 style="font-size:18px;font-weight:800;color:var(--green-dark);margin:8px 0 4px">Kết quả bài thi</h2>
    <div style="font-size:36px;font-weight:900;color:var(--gold-dark);margin:6px 0">${pct}%</div>
    <div style="display:inline-block;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;background:${color}22;color:${color};border:1px solid ${color};margin-bottom:10px">${grade}</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:4px">Đúng: <strong>${state.correct}</strong> / Sai: <strong>${state.wrong}</strong> / Chưa làm: <strong>${75-done}</strong></p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px">⏱ Thời gian đã dùng: <strong>${String(em).padStart(2,'0')}:${String(es).padStart(2,'0')}</strong></p>
    <div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:12px;text-align:left">
      <div style="font-size:11px;font-weight:800;color:var(--green-dark);text-transform:uppercase;margin-bottom:8px">Kết quả theo phần</div>
      ${secBreak}
    </div>
    <button class="modal-btn" onclick="closeModal();jumpToNext()">▶ Tiếp tục làm câu còn lại</button>
    <button class="modal-btn" onclick="closeModal()" style="margin-top:6px;background:#fff;color:var(--green-mid);border:2px solid var(--green-mid)">Ôn tập lại</button>
    <button class="modal-btn" onclick="resetExam();closeModal()" style="margin-top:6px;background:#fff;color:var(--red);border:2px solid var(--red)">🔄 Làm lại từ đầu</button>
  `;
  document.getElementById('modal-overlay').classList.add('shown');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('shown');
}

document.addEventListener('DOMContentLoaded', () => {
  updateTimerDisplay();
  renderAll();
});

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
</script>
</body>
</html>
